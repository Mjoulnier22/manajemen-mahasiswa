<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(
                135deg,
                #0d6efd,
                #6610f2
            );
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            margin-bottom:20px;
        }

        .logo h2{
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        <h2>🎓 SIMAK</h2>
        <p>Sistem Informasi Mahasiswa</p>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}

    {% for msg in messages %}

    <div class="alert alert-danger">
        {{ msg }}
    </div>

    {% endfor %}

    {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <button
            class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <hr>

    <small class="text-muted">
        Username: admin <br>
        Password: 12345
    </small>

</div>

</body>

</html>
